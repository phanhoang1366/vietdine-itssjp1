<!DOCTYPE html>

<html class="light" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed-dim": "#e9c176",
              "secondary-fixed": "#ffdea5",
              "on-error": "#ffffff",
              "on-secondary": "#ffffff",
              "tertiary": "#0c2b12",
              "on-primary-fixed": "#2b1611",
              "surface-container-high": "#ebe8e3",
              "inverse-surface": "#31302d",
              "inverse-primary": "#e5beb5",
              "primary-container": "#4e342e",
              "on-surface": "#1c1c19",
              "on-primary-container": "#c19c94",
              "surface": "#fcf9f4",
              "primary": "#361f1a",
              "on-secondary-fixed": "#261900",
              "error": "#ba1a1a",
              "secondary": "#775a19",
              "on-surface-variant": "#504442",
              "on-tertiary-container": "#8aad8a",
              "on-secondary-container": "#785a1a",
              "error-container": "#ffdad6",
              "primary-fixed": "#ffdad2",
              "on-primary": "#ffffff",
              "primary-fixed-dim": "#e5beb5",
              "surface-container-low": "#f6f3ee",
              "surface-bright": "#fcf9f4",
              "on-background": "#1c1c19",
              "tertiary-fixed": "#c7ecc6",
              "on-tertiary": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "outline-variant": "#d4c3bf",
              "surface-container": "#f0ede8",
              "surface-dim": "#dcdad5",
              "surface-variant": "#e5e2dd",
              "tertiary-fixed-dim": "#acd0ab",
              "on-tertiary-fixed-variant": "#2f4e32",
              "on-primary-fixed-variant": "#5c403a",
              "on-tertiary-fixed": "#022109",
              "on-secondary-fixed-variant": "#5d4201",
              "on-error-container": "#93000a",
              "inverse-on-surface": "#f3f0eb",
              "secondary-container": "#fed488",
              "tertiary-container": "#224126",
              "outline": "#827471",
              "surface-container-highest": "#e5e2dd",
              "background": "#fcf9f4",
              "surface-tint": "#755750"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .komorebi-shadow {
            box-shadow: 0 20px 50px rgba(54, 31, 26, 0.05);
        }
        .zen-blur {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">
<!-- Background Layer with Komorebi aesthetic -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-tr from-surface via-surface-container-low to-surface-container-high opacity-60"></div>
<img alt="Interior" class="w-full h-full object-cover opacity-20 filter grayscale-[0.2] sepia-[0.1]" data-alt="Blurred atmospheric interior of a minimalist Japanese restaurant with soft sunlight filtering through wooden slats, warm tones, zen garden view" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBP2zhXGxZWhLh8hL-L2oAulwrtlkd4iUZDdaMK2cO9ahcNQjff-LUKz9IkLwOV3rDDaz2Gg-Qx16vLmBEkDVZ8LQSyi3Igrir9xjB5S1TulmnsIbodav8ZH9v95wmTl558r6wJO9vKEhjd0sZ29GzLZsZa-Hf-2KEY2efG_va5Ndw45RKOTXqZrAjfKtLQXfo7OIAP-Jbctl6NGSDkURxkBMSIIlaMKLIxPoRIFNPis63jNFsmYEaCj3mqx4DD-1ANSs86bH2YIuw"/>
<!-- Animated Komorebi-like light spots (Visual purely) -->
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[60%] bg-secondary-fixed-dim/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[30%] h-[50%] bg-primary-container/5 rounded-full blur-[100px]"></div>
</div>
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 h-20">
<div class="text-2xl font-extrabold tracking-tighter text-primary">VietDine</div>
<button class="flex items-center gap-2 px-5 py-2 rounded-full bg-primary text-on-primary text-sm font-semibold tracking-wide transition-all hover:opacity-90 active:scale-95">
<span class="material-symbols-outlined text-[18px]">storefront</span>
            レストランオーナー
        </button>
</header>
<main class="relative z-10 flex min-h-screen items-center justify-center px-4 py-20">
<div class="w-full max-w-md">
<!-- Asymmetric Editorial Header -->
<div class="mb-12 pl-2 border-l-2 border-secondary">
<h1 class="text-4xl font-extrabold tracking-tight text-primary leading-tight">おかえりなさい。</h1>
<p class="mt-3 text-on-surface-variant font-medium text-sm tracking-wide">禅の精神を込めた美食体験</p>
</div>
<!-- Login Container -->
<div class="bg-surface-container-lowest/80 zen-blur p-8 md:p-10 rounded-[2rem] komorebi-shadow">
<form class="space-y-6">
<!-- Input Group -->
<div class="space-y-4">
<div class="group relative">
<label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-1.5 ml-1">メールアドレスまたは電話番号</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl transition-colors group-focus-within:text-primary">mail</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-4 text-sm font-medium focus:ring-2 focus:ring-primary/10 transition-all placeholder:text-outline-variant" placeholder="example@vietdine.com" type="text"/>
</div>
</div>
<div class="group relative">
<div class="flex justify-between items-end mb-1.5 px-1">
<label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">パスワード</label>
<a class="text-[10px] font-bold uppercase tracking-widest text-secondary hover:text-primary transition-colors" href="#">パスワードをお忘れですか？</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl transition-colors group-focus-within:text-primary">lock</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-4 text-sm font-medium focus:ring-2 focus:ring-primary/10 transition-all placeholder:text-outline-variant" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary py-4 rounded-xl font-bold tracking-widest uppercase text-xs shadow-lg shadow-primary/20 hover:bg-primary-container transition-all active:scale-[0.98]" type="submit">
                        ログイン
                    </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-xs">
<span class="bg-transparent px-4 text-outline font-medium tracking-widest uppercase">または次で続ける</span>
</div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-3.5 px-4 bg-surface-container-low border border-outline-variant/20 rounded-xl hover:bg-surface-container-high transition-colors active:scale-95">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-xs font-bold uppercase tracking-wider text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-3 py-3.5 px-4 bg-surface-container-low border border-outline-variant/20 rounded-xl hover:bg-surface-container-high transition-colors active:scale-95">
<svg class="w-5 h-5" fill="#1877F2" viewbox="0 0 24 24">
<path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path>
</svg>
<span class="text-xs font-bold uppercase tracking-wider text-on-surface">Facebook</span>
</button>
</div>
</div>
<!-- Footer Quote/Registration Link -->
<p class="mt-8 text-center text-sm font-medium text-on-surface-variant">
                アカウントをお持ちでないですか？
                <a class="text-primary font-bold hover:underline ml-1" href="#">今すぐ新規登録</a>
</p>
</div>
</main>
<!-- Bottom Decorative "Zen" Element -->
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-4 text-[10px] text-outline font-bold uppercase tracking-[0.2em] opacity-40 select-none">
<span>Authentic</span>
<div class="w-1 h-1 rounded-full bg-outline"></div>
<span>Minimalist</span>
<div class="w-1 h-1 rounded-full bg-outline"></div>
<span>VietDine</span>
</div>
</body></html>
