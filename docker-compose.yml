services:
  db:
    image: postgres:16-alpine
    container_name: vietdine-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vietdine}
      POSTGRES_USER: ${POSTGRES_USER:-vietdine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vietdine_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vietdine-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-vietdine}:${POSTGRES_PASSWORD:-vietdine_password}@db:5432/${POSTGRES_DB:-vietdine}?schema=public
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SESSION_SECRET: ${SESSION_SECRET:-change_me_for_shared_demo}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      RUN_SEED: ${RUN_SEED:-true}
    ports:
      - "${BACKEND_PORT:-3001}:3001"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        SERVER_API_URL: ${SERVER_API_URL:-http://backend:3001}
        INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:3001}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    container_name: vietdine-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      SERVER_API_URL: ${SERVER_API_URL:-http://backend:3001}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:3001}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres-data:
